# ============================================
# FILE: nginx.conf
# PURPOSE: Optimized Nginx for Flutter Web SPA serving on Railway
# FEATURES: SPA routing, Cache control, gzip compression
# ============================================

server {
    listen 80;
    server_name localhost;

    # Set root directory for static assets
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Enable Gzip compression (Production-ready performance)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Single Page Application (SPA) Routing
    # Handle client-side routing by redirecting all missing files to index.html
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Security Headers (HIPAA & Best Practice)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data:; font-src 'self' https: data:;" always;

    # Cache Control for Static Assets
    # Images and fonts are safe to cache for a long time
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # CRITICAL: Ensure index.html is NEVER cached to avoid deployment lag
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Custom 404 handler
    error_page 404 /index.html;
}
